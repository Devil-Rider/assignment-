name: Deploy SQLQuest to GitHub Pages

# Deploys the static site in ./web to GitHub Pages.
# Runs on pushes to main (after you merge), on the feature branch,
# and can be triggered manually from the Actions tab.
on:
  push:
    branches:
      - main
      - claude/sql-learning-platform-yphn5z
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Permissions required for the Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate lesson solutions
        run: node web/test/run-solutions.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site (the web/ folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
